<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Speed Clicker 1vs1 | PersoVin</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./faviconi.ico" type="image/x-icon">

    <style>
        /* --- CSS STYLING --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #050505;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(20, 20, 20, 0.95);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff;
        }

        /* Layar Setup Nama */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input {
            padding: 15px;
            background: #111;
            border: 2px solid #444;
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 1rem;
        }

        /* Papan Skor */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 15px;
        }
        .player-box {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #333;
            transition: 0.3s;
        }
        #boxP1 { border-color: #ff0055; box-shadow: 0 0 10px rgba(255, 0, 85, 0.2); }
        #boxP2 { border-color: #00f2ff; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .score { font-size: 2.2rem; font-family: 'Orbitron'; font-weight: bold; }

        /* Arena Pertarungan */
        .game-area {
            height: 300px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            position: relative;
            margin-bottom: 20px;
            border: 1px solid #222;
            overflow: hidden;
        }

        /* Garis Tengah Pembatas */
        .game-area::before {
            content: "VS";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 1px;
            height: 80%;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.2);
            font-family: 'Orbitron';
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .target-btn {
            padding: 18px 30px;
            font-size: 1rem;
            font-family: 'Orbitron';
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: absolute;
            display: none;
            z-index: 10;
        }

        .btn-p1 { background: #ff0055; color: white; box-shadow: 0 0 20px #ff0055; }
        .btn-p2 { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }

        .main-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #ff0055, #00f2ff);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        #statusText { font-size: 1.1rem; color: #ffd700; margin-top: 10px; min-height: 25px; }
        .hidden { display: none !important; }

        #instruction {
            position: absolute;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            letter-spacing: 2px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NEON SPEED ⚡</h1>

    <div id="setupScreen">
        <div class="input-group">
            <input type="text" id="p1Name" placeholder="Nama Player 1 (Kiri)" value="Player 1">
            <input type="text" id="p2Name" placeholder="Nama Player 2 (Kanan)" value="Player 2">
        </div>
        <button class="main-btn" onclick="startGame()">Mulai Pertandingan</button>
    </div>

    <div id="gameArena" class="hidden">
        <div class="scoreboard">
            <div class="player-box" id="boxP1">
                <p id="labelP1" style="font-size: 0.8rem;">P1</p>
                <div class="score" id="scoreP1">0</div>
            </div>
            <div class="player-box" id="boxP2">
                <p id="labelP2" style="font-size: 0.8rem;">P2</p>
                <div class="score" id="scoreP2">0</div>
            </div>
        </div>

        <div class="game-area" id="area">
            <p id="instruction">SIAP...</p>
            <button id="btnP1" class="target-btn btn-p1" onclick="hit(1)">TAP!</button>
            <button id="btnP2" class="target-btn btn-p2" onclick="hit(2)">TAP!</button>
        </div>

        <p id="statusText"></p>
        <button id="resetBtn" class="main-btn hidden" onclick="location.reload()">Main Lagi</button>
    </div>
</div>

<script>
    let p1 = { name: "", score: 0 };
    let p2 = { name: "", score: 0 };
    let gameActive = false;

    function startGame() {
        p1.name = document.getElementById("p1Name").value || "Player 1";
        p2.name = document.getElementById("p2Name").value || "Player 2";
        
        document.getElementById("labelP1").textContent = p1.name;
        document.getElementById("labelP2").textContent = p2.name;
        
        document.getElementById("setupScreen").classList.add("hidden");
        document.getElementById("gameArena").classList.remove("hidden");
        
        nextRound();
    }

    function nextRound() {
        if (p1.score >= 10 || p2.score >= 10) return endGame();

        gameActive = false;
        document.getElementById("btnP1").style.display = "none";
        document.getElementById("btnP2").style.display = "none";
        document.getElementById("instruction").textContent = "TUNGGU...";
        
        // Jeda acak 1.5 - 4.5 detik
        const delay = Math.random() * 3000 + 1500; 
        setTimeout(spawnButtons, delay);
    }

    function spawnButtons() {
        gameActive = true;
        document.getElementById("instruction").textContent = "";
        
        const b1 = document.getElementById("btnP1");
        const b2 = document.getElementById("btnP2");
        const area = document.getElementById("area");
        
        const mid = area.offsetWidth / 2;
        const h = area.offsetHeight;

        // Koordinat Y (Tinggi) dibuat sama agar adil
        const y = Math.random() * (h - 80);

        // Koordinat X: P1 di kiri, P2 di kanan (tidak mungkin bertumpuk)
        const xP1 = Math.random() * (mid - 100);
        const xP2 = mid + (Math.random() * (mid - 100));

        b1.style.left = xP1 + "px";
        b1.style.top = y + "px";
        b1.style.display = "block";

        b2.style.left = xP2 + "px";
        b2.style.top = y + "px";
        b2.style.display = "block";
    }

    function hit(playerNum) {
        if (!gameActive) return;
        gameActive = false;

        // Efek Getar HP (Vibration API)
        if (navigator.vibrate) navigator.vibrate(50);

        if (playerNum === 1) {
            p1.score++;
            document.getElementById("scoreP1").textContent = p1.score;
            document.getElementById("statusText").textContent = "⚡ " + p1.name + " +1";
        } else {
            p2.score++;
            document.getElementById("scoreP2").textContent = p2.score;
            document.getElementById("statusText").textContent = "⚡ " + p2.name + " +1";
        }

        setTimeout(() => {
            document.getElementById("statusText").textContent = "";
            nextRound();
        }, 800);
    }

    function endGame() {
        const winner = p1.score >= 10 ? p1.name : p2.name;
        document.getElementById("instruction").style.color = "#4ade80";
        document.getElementById("instruction").innerHTML = `🏆 MATCH OVER<br>${winner} WINS!`;
        document.getElementById("btnP1").style.display = "none";
        document.getElementById("btnP2").style.display = "none";
        document.getElementById("resetBtn").classList.remove("hidden");
    }
</script>

</body>
</html>
